services:
  postgres:
    image: postgres:16-alpine
    container_name: leadspace-unicom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unicom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-unicom}
    volumes:
      - unicom_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unicom} -d ${POSTGRES_DB:-unicom}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leadspace-unicom-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - unicom_uploads:/app/uploads
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicom}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-unicom}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_URL: ${AUTH_URL:-https://uni.orblead.com}
      AUTH_TRUST_HOST: "true"
      PERSONNEL_FILE: ${PERSONNEL_FILE:-./data/罗湖联通业务员名单.xlsx}
      ORDERS_FILE: ${ORDERS_FILE:-./data/业绩登记模版-上传数据系统.xlsx}

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    profiles: ["init"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-unicom}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-unicom}?schema=public
    restart: "no"

volumes:
  unicom_pg_data:
  unicom_uploads:
