services:
  postgres:
    image: postgres:16-alpine
    container_name: unicom-dev-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: unicom
      POSTGRES_PASSWORD: unicom
      POSTGRES_DB: unicom
    volumes:
      - unicom_dev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicom -d unicom"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unicom_dev_pg:
